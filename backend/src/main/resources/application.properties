# Server Configuration
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:homecanvas;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.homecanvas=DEBUG

# JWT Configuration
jwt.secret=your_secret_key_here_at_least_256_bits_long_for_security_purposes
jwt.expiration=86400000

# CORS Configuration (for React frontend)
app.cors.allowedOrigins=http://localhost:5173,http://localhost:3000
